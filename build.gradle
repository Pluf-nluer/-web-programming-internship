/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java-library'
    id 'maven-publish'
    id 'war'
    id "org.hidetake.ssh" version "2.11.2"
}

apply plugin: "org.hidetake.ssh"

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    api libs.com.mysql.mysql.connector.j
    api libs.jakarta.servlet.jsp.jstl.jakarta.servlet.jsp.jstl.api
    api libs.org.glassfish.web.jakarta.servlet.jsp.jstl
    api libs.com.google.api.client.google.api.client
    api libs.com.google.http.client.google.http.client.gson
    testImplementation libs.org.junit.jupiter.junit.jupiter.api
    testImplementation libs.org.junit.jupiter.junit.jupiter.engine
    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'
}

group = 'com.example'
version = '1.0-SNAPSHOT'
description = 'backend'
java.sourceCompatibility = JavaVersion.VERSION_1_8

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}

remotes {
    host {
        host = '192.168.6.131'
        user = 'root'
        password = 'centos'
    }
}

ssh.settings {
    knownHosts = allowAnyHosts
}

task docker_app_start {
    doLast {
        println 'begin docker_app_start'
        project.ssh.run {
            session(remotes.host) {
                execute 'docker stop tomcat9', ignoreError: true
                execute 'docker rm tomcat9', ignoreError: true
                execute 'docker run -d ' +
                        '--name tomcat9 ' +
                        '-v /usr/deploy:/usr/local/tomcat/webapps ' +
                        '-p 80:8080 ' +
                        'tomcat:10.1'
            }
        }
    }
}

task docker_upload_file_to_server {
    dependsOn build
    doLast {
        println 'begin docker_upload_file_to_server'
        project.ssh.run {
            session(remotes.host) {
                execute 'rm -rf /usr/deploy/*', ignoreError: true

                put from: "${project.projectDir}/build/libs/${project.name}-${version}.war",
                        into: "/usr/deploy/lab.war"
            }
        }
    }
}

task docker_deploy {
    dependsOn docker_upload_file_to_server
    dependsOn docker_app_start
}
